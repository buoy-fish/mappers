upstream mapper {
    server 127.0.0.1:4001;
}

upstream martin {
    server 127.0.0.1:3000;
}

# HTTP - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name map.buoy.fish;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - coverage mapper
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name map.buoy.fish;

    # SSL Certificate (managed by Certbot)
    # Run: sudo certbot --nginx -d map.buoy.fish
    ssl_certificate /etc/letsencrypt/live/map.buoy.fish/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/map.buoy.fish/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Maintenance page for 502/503/504 errors
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /home/ubuntu/app.buoy.fish/deploy;
        internal;
    }

    # Martin vector tile server
    location /tiles/ {
        rewrite ^/tiles/(.*)$ /$1 break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for tile requests
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type' always;

        # Cache tiles aggressively
        proxy_cache_valid 200 1d;
        expires 1d;
    }

    # Mappers Phoenix application
    location / {
        proxy_pass http://mapper;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts for websockets (Phoenix Channels for real-time hex updates)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Static assets
    location ~* ^.+\.(jpg|jpeg|gif|png|ico|css|js|pdf|txt|woff|woff2|ttf|svg)$ {
        proxy_pass http://mapper;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
