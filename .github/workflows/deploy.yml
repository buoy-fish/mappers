name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-mapper
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Mapper
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/buoy-fish-deploy.pem
          chmod 600 ~/.ssh/buoy-fish-deploy.pem
          ssh-keyscan -H app.buoy.fish >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy mapper
        run: |
          # Write deploy script to a temp file so we can use ssh -T with proper exit code propagation
          cat > /tmp/deploy-mapper.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          MAPPER_DIR="/home/ubuntu/map.buoy.fish"
          APP_DEPLOY="/home/ubuntu/app.buoy.fish/deploy"

          # ── Pull latest code ──
          cd "$MAPPER_DIR"
          git fetch origin
          git checkout -- . 2>/dev/null || true
          git checkout origin/main
          echo "✓ Switched to origin/main: $(git log --oneline -1)"

          # ── Load environment ──
          set -a; source .env; set +a

          # ── Install dependencies ──
          echo "Installing Elixir deps..."
          MIX_ENV=prod nix develop --command mix deps.get --only prod
          echo "Installing Node deps..."
          nix develop --command bash -c 'cd assets && npm install'
          echo "✓ Dependencies installed"

          # ── Build assets ──
          echo "Building assets..."
          nix develop --command bash -c 'cd assets && NODE_ENV=production node build.mjs --deploy'
          echo "Running phx.digest..."
          MIX_ENV=prod nix develop --command mix phx.digest
          echo "✓ Assets built"

          # ── Migrate + compile ──
          echo "Running migrations..."
          MIX_ENV=prod nix develop --command mix ecto.migrate
          echo "Compiling..."
          MIX_ENV=prod nix develop --command mix compile --force
          echo "✓ Migrated and compiled"

          # ── Sync infra configs from app.buoy.fish (if available) ──
          RELOAD_NEEDED=false
          if [ -d "$APP_DEPLOY" ]; then
              for SVC in buoy_mapper.service martin.service; do
                  if [ -f "$APP_DEPLOY/$SVC" ]; then
                      if ! diff -q "$APP_DEPLOY/$SVC" "/etc/systemd/system/$SVC" > /dev/null 2>&1; then
                          sudo cp "$APP_DEPLOY/$SVC" "/etc/systemd/system/$SVC"
                          RELOAD_NEEDED=true
                          echo "$SVC updated"
                      fi
                  fi
              done
              if [ -f "$APP_DEPLOY/nginx-map-buoy-fish.conf" ]; then
                  if ! diff -q "$APP_DEPLOY/nginx-map-buoy-fish.conf" /etc/nginx/sites-available/map-buoy-fish > /dev/null 2>&1; then
                      sudo cp "$APP_DEPLOY/nginx-map-buoy-fish.conf" /etc/nginx/sites-available/map-buoy-fish
                      sudo ln -sf /etc/nginx/sites-available/map-buoy-fish /etc/nginx/sites-enabled/map-buoy-fish
                      RELOAD_NEEDED=true
                      echo "Mapper nginx config updated"
                  fi
              fi
          fi

          if [ "$RELOAD_NEEDED" = true ]; then
              sudo systemctl daemon-reload
              sudo nginx -t && sudo systemctl reload nginx
          fi

          # ── Restart services ──
          sudo systemctl restart buoy_mapper martin
          echo "✓ Services restarted"

          sleep 5

          # ── Verify ──
          if sudo systemctl is-active --quiet buoy_mapper && sudo systemctl is-active --quiet martin; then
              echo "✓ All services active — deploy complete"
          else
              echo "FAILED: Service check failed"
              sudo systemctl status buoy_mapper --no-pager | head -10
              sudo systemctl status martin --no-pager | head -10
              exit 1
          fi
          SCRIPT

          # Copy script to server and execute it (properly propagates exit code)
          scp -i ~/.ssh/buoy-fish-deploy.pem -o StrictHostKeyChecking=no /tmp/deploy-mapper.sh ubuntu@app.buoy.fish:/tmp/deploy-mapper.sh
          ssh -i ~/.ssh/buoy-fish-deploy.pem -o StrictHostKeyChecking=no ubuntu@app.buoy.fish 'bash /tmp/deploy-mapper.sh'
